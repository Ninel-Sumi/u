  <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores Amarillas</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(270deg, #000000, #1a0f00, #000000);
  background-size: 600% 600%;
  animation: fondo 12s ease infinite;
}

@keyframes fondo {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* TEXTO */
.titulo {
  position: absolute;
  top: 3vh;
  width: 100%;
  text-align: center;
  font-size: 4vw;
  color: #ffd54f;
  text-shadow: 0 0 1vw #ffcc00;
  z-index: 5;
}

/* CONTENEDOR */
.container {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* FLOR */
.flor {
  position: absolute;
  transform: translateX(-50%);
  transform-origin: bottom center;
  animation: balanceo 4s ease-in-out infinite;
  z-index: 3;
}

@keyframes balanceo {
  0% { transform: translateX(-50%) rotate(var(--rot)) rotate(-2deg); }
  50% { transform: translateX(-50%) rotate(var(--rot)) rotate(2deg); }
  100% { transform: translateX(-50%) rotate(var(--rot)) rotate(-2deg); }
}

/* PÉTALOS */
.petalo {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, #fff176, #ffeb3b, #ffb300);
  box-shadow: 0 0 0.3vw #ffeb3b, 0 0 0.5vw #ffb300;
  transform-origin: center 60%;
  z-index: 2;
}

/* CENTRO */
.centro {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, #6d4c41, #3e2723);
  z-index: 3;
}

/* TALLO */
.tallo {
  position: absolute;
  background: linear-gradient(#66bb6a, #1b5e20);
  border-radius: 0.5vw;
  transform-origin: top center;
  z-index: 1;
}

/* HOJAS */
.hoja {
  position: absolute;
  background: linear-gradient(#66bb6a, #1b5e20);
  border-radius: 50%;
}

.hoja.izq { transform: rotate(-30deg); }
.hoja.der { transform: rotate(30deg); }

/* MOÑO */
.mono {
  position: absolute;
  background: #c77dff;
  border-radius: 50%;
  z-index: 6;
  transform: translateX(-50%);
}

/* DESTELLOS */
.destello {
  position: absolute;
  background: gold;
  border-radius: 50%;
  animation: subir 6s linear infinite;
  z-index: 1;
}

/* CORAZONES */
.corazon {
  position: absolute;
  background: gold;
  transform: rotate(45deg);
  animation: subir 8s linear infinite;
  z-index: 1;
}

.corazon::before,
.corazon::after {
  content: "";
  position: absolute;
  background: gold;
  border-radius: 50%;
}

.corazon::before { top: -50%; left: 0; }
.corazon::after { top: 0; left: -50%; }

@keyframes subir {
  0% { transform: translateY(0) scale(0.7); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-70vh) scale(1); opacity: 0; }
}
</style>
</head>

<body>
<div class="titulo">Feliz día de las Flores Amarillas 💛</div>
<div class="container" id="flores"></div>
<div class="mono" id="mono"></div>

<script src="script.js"></script>
</body>
</html>
