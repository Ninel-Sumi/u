<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores Amarillas</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: black;
  font-family: 'Segoe UI', sans-serif;
}

/* TEXTO */
.titulo {
  position: absolute;
  top: 3vh;
  width: 100%;
  text-align: center;
  font-size: 4vw;
  color: #ffd54f;
  text-shadow: 0 0 1vw #ffcc00, 0 0 2vw #ff9900;
  z-index: 5;
}

/* CONTENEDOR */
.container {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* FLOR */
.flor {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

/* 🌻 CABEZA */
.cabeza {
  position: relative;
  animation: balanceo 4s ease-in-out infinite;
  transform-origin: bottom center;
  z-index: 2;
}

@keyframes balanceo {
  0% { transform: rotate(var(--rot)) rotate(-2deg); }
  50% { transform: rotate(var(--rot)) rotate(2deg); }
  100% { transform: rotate(var(--rot)) rotate(-2deg); }
}

/* PÉTALOS */
.petalo {
  background: radial-gradient(circle, #ffeb3b, #ff9800);
  border-radius: 50%;
  position: absolute;
  transform-origin: bottom center;
  box-shadow: 0 0 0.5vw #ffcc00;
  z-index: 2;
}

/* CENTRO */
.centro {
  background: #5a3a0a;
  border-radius: 50%;
  position: absolute;
  z-index: 3;
}

/* 🌿 TALLO */
.tallo {
  background: linear-gradient(#66bb6a, #1b5e20);
  position: absolute;
  border-radius: 0.5vw;
  transform: translateX(-50%);
  z-index: 1;
}

/* HOJAS */
.hoja {
  background: linear-gradient(#66bb6a, #1b5e20);
  border-radius: 50%;
  position: absolute;
}

.hoja.izq { transform: rotate(-30deg); }
.hoja.der { transform: rotate(30deg); }

/* DESTELLOS */
.destello {
  position: absolute;
  background: gold;
  border-radius: 50%;
  box-shadow: 0 0 0.5vw gold;
  animation: subir 6s linear infinite;
  z-index: 0;
}

/* CORAZONES */
.corazon {
  position: absolute;
  background: gold;
  transform: rotate(45deg);
  animation: subir 8s linear infinite;
  box-shadow: 0 0 0.5vw gold;
  z-index: 0;
}

.corazon::before,
.corazon::after {
  content: "";
  position: absolute;
  background: gold;
  border-radius: 50%;
}

.corazon::before { top: -50%; left: 0; }
.corazon::after { top: 0; left: -50%; }

@keyframes subir {
  0% { transform: translateY(0) rotate(45deg); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-70vh) rotate(45deg); opacity: 0; }
}
</style>
</head>

<body>
<div class="titulo">Feliz día de las Flores Amarillas ❤️</div>
<div class="container" id="flores"></div>

<script src="script.js"></script>
</body>
</html>
